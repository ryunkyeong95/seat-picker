<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회식 자리 뽑기</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(180deg, #fff8ef, #f5efe5);
            text-align: center;
            padding: 30px;
        }

        h1 {
            margin-bottom: 8px;
            color: #5b3d1c;
            font-size: 42px;
        }

        p {
            color: #8a6a45;
            font-size: 18px;
        }

        .subtitle {
            font-size: 16px;
            color: #b9770e;
            font-weight: bold;
            margin-bottom: 12px;
        }

        .guide-title {
            font-size: 18px;
            font-weight: bold;
            color: #8a6a45;
        }

        ol {
            display: inline-block;
            text-align: left;
            color: #8a6a45;
            font-size: 16px;
        }

        .warning {
            color: #c0392b;
            font-size: 15px;
            font-weight: bold;
            line-height: 1.7;
        }

        .seating-map {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0;
            overflow-x: auto;
            padding: 20px 0;
        }

        .table-block {
            width: 430px;
            flex-shrink: 0;
        }

        .seat-row {
            display: flex;
            justify-content: space-around;
            margin: 0 0 14px;
        }

        .seat-row.bottom {
            margin: 14px 0 0;
        }

        .long-table {
            height: 150px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 42px;
            background: linear-gradient(90deg, #f4e2c7, #f8ead6, #f4e2c7);
            border: 3px solid #d8b98c;
            border-radius: 18px;
            box-shadow: 0 6px 15px rgba(0, 0, 0, .2);
        }

        .seat,
        .empty-seat,
        .pillar-seat {
            width: 70px;
            height: 70px;
            border-radius: 14px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .seat {
            background: #ff8fb1;
            color: white;
            cursor: pointer;
            transition: all .2s ease;
            font-size: 22px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, .18);
        }

        .seat:hover {
            transform: translateY(-4px) scale(1.05);
        }

        .empty-seat {
            background: #ddd;
            color: #777;
            flex-direction: column;
            font-size: 22px;
            box-shadow: 0 3px 6px rgba(0, 0, 0, 0.12);
        }

        .empty-seat span {
            font-size: 13px;
            margin-top: 4px;
        }

        .pillar-seat {
            background: #6b5b53;
            color: white;
            flex-direction: column;
            font-size: 12px;
            box-shadow:
                inset 0 0 0 3px rgba(255, 255, 255, 0.25),
                0 3px 6px rgba(0, 0, 0, 0.18);
            cursor: not-allowed;
        }

        .pillar-seat span {
            font-size: 11px;
            margin-top: 2px;
        }

        @media (max-width: 900px) {
            .seating-map {
                justify-content: flex-start;
            }
        }

        #resetBtn,
        #adminModeBtn {
            margin-bottom: 20px;
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        #resetBtn {
            background: #e74c3c;
        }

        #adminModeBtn {
            background: #8e44ad;
        }

        #resetBtn:hover,
        #adminModeBtn:hover {
            opacity: 0.9;
        }
    </style>
</head>

<body>

    <h1>🍻 회식 자리 뽑기</h1>

    <button id="resetBtn" style="display:none;">
        관리자 초기화
    </button>

    <button id="adminModeBtn" style="display:none;">
        관리자 모드
    </button>

    <p class="subtitle">⏰ 선착순 선택</p>

    <p class="guide-title">📌 이용 방법</p>

    <ol>
        <li>앉고 싶은 자리를 클릭해주세요.</li>
        <li>이름을 입력하면 자리 선택이 완료됩니다.</li>
    </ol>

    <p class="warning">
        ※ 회색 좌석은 이미 선택된 자리입니다.<br>
        ※ 한 사람당 1개의 자리만 선택 가능합니다.<br>
        ※ 이미 선택된 자리는 선택할 수 없습니다.<br>
        ※ 선택 후 변경이 어려우니 신중하게 선택해주세요.
    </p>

    <div class="seating-map">

        <div class="table-block">
            <div class="seat-row">
                <div class="seat" data-seat-id="seat-1">1</div>
                <div class="seat" data-seat-id="seat-2">2</div>
                <div class="seat" data-seat-id="seat-3">3</div>
                <div class="seat" data-seat-id="seat-4">4</div>
            </div>
            <div class="long-table">🥩 🍺 🍻 🥬</div>
            <div class="seat-row bottom">
                <div class="seat" data-seat-id="seat-5">5</div>
                <div class="seat" data-seat-id="seat-6">6</div>
                <div class="seat" data-seat-id="seat-7">7</div>
                <div class="seat" data-seat-id="seat-8">8</div>
            </div>
        </div>

        <div class="table-block">
            <div class="seat-row">
                <div class="pillar-seat">
                    🏛️
                    <span>기둥</span>
                </div>
                <div class="seat" data-seat-id="seat-9">9</div>
                <div class="seat" data-seat-id="seat-10">10</div>
                <div class="seat" data-seat-id="seat-11">11</div>
            </div>
            <div class="long-table">🥩 🍺 🍻 🥬</div>
            <div class="seat-row bottom">
                <div class="pillar-seat">
                    🏛️
                    <span>기둥</span>
                </div>
                <div class="seat" data-seat-id="seat-12">12</div>
                <div class="seat" data-seat-id="seat-13">13</div>
                <div class="seat" data-seat-id="seat-14">14</div>
            </div>
        </div>

        <div class="table-block">
            <div class="seat-row">
                <div class="seat" data-seat-id="seat-15">15</div>
                <div class="seat" data-seat-id="seat-16">16</div>
                <div class="seat" data-seat-id="seat-17">17</div>
                <div class="empty-seat">빈자리</div>
            </div>
            <div class="long-table">🥩 🍺 🍻 🥬</div>
            <div class="seat-row bottom">
                <div class="seat" data-seat-id="seat-18">18</div>
                <div class="seat" data-seat-id="seat-19">19</div>
                <div class="seat" data-seat-id="seat-20">20</div>
                <div class="empty-seat">빈자리</div>
            </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";

        import {
            getFirestore,
            doc,
            setDoc,
            collection,
            onSnapshot,
            getDocs,
            deleteDoc
        } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAvpfJGYP5wmuhIsW2dFxO7Cu1fUZOsCjw",
            authDomain: "seat-picker-fdea4.firebaseapp.com",
            projectId: "seat-picker-fdea4",
            storageBucket: "seat-picker-fdea4.firebasestorage.app",
            messagingSenderId: "366627890858",
            appId: "1:366627890858:web:a19f63ca2225afbc88d2d3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const seats = document.querySelectorAll(".seat");
        const selectedSeats = {};
        let isAdminMode = false;

        seats.forEach((seat) => {
            seat.dataset.originalText = seat.textContent;
        });

        function resetSeatDisplay() {
            seats.forEach((seat) => {
                seat.textContent = seat.dataset.originalText;
                seat.style.background = "#ff8fb1";
            });
        }

        function renderSeats() {
            resetSeatDisplay();

            seats.forEach((seat) => {
                const seatId = seat.dataset.seatId;
                const name = selectedSeats[seatId];

                if (!name) return;

                const myName = localStorage.getItem("myName");

                if (isAdminMode) {
                    seat.textContent = name;
                    seat.style.background = "#8e44ad";
                } else if (name === myName) {
                    seat.textContent = name;
                    seat.style.background = "#ff4f87";
                } else {
                    seat.textContent = "선택됨";
                    seat.style.background = "#999";
                }
            });
        }

        onSnapshot(collection(db, "seats"), (snapshot) => {
            Object.keys(selectedSeats).forEach((key) => {
                delete selectedSeats[key];
            });

            snapshot.forEach((docItem) => {
                selectedSeats[docItem.id] = docItem.data().name;
            });

            renderSeats();
        });

        seats.forEach((seat) => {
            seat.addEventListener("click", async () => {
                const seatId = seat.dataset.seatId;
                const myName = localStorage.getItem("myName");

                if (myName) {
                    const stillExists = Object.values(selectedSeats).includes(myName);

                    if (stillExists) {
                        alert("이미 자리를 선택하셨습니다.");
                        return;
                    }

                    localStorage.removeItem("myName");
                }

                if (selectedSeats[seatId]) {
                    alert("이미 선택된 자리입니다.");
                    return;
                }

                const name = prompt("이름을 입력해주세요.")?.trim();

                if (!name) return;

                const alreadyExists = Object.values(selectedSeats).includes(name);

                if (alreadyExists) {
                    alert("이미 사용 중인 이름입니다.");
                    return;
                }

                localStorage.setItem("myName", name);

                await setDoc(doc(db, "seats", seatId), {
                    name: name
                });

                alert("자리 선택 완료!");
            });
        });

        document
            .getElementById("resetBtn")
            .addEventListener("click", async () => {
                const password = prompt("관리자 비밀번호를 입력하세요.");

                if (password !== "fbsrud12@@") {
                    alert("비밀번호가 틀렸습니다.");
                    return;
                }

                const snapshot = await getDocs(collection(db, "seats"));

                for (const item of snapshot.docs) {
                    await deleteDoc(item.ref);
                }

                localStorage.removeItem("myName");

                alert("전체 자리가 초기화되었습니다.");

                location.reload();
            });

        let titleClickCount = 0;

        document.querySelector("h1").addEventListener("click", () => {
            titleClickCount++;

            if (titleClickCount >= 5) {
                document.getElementById("resetBtn").style.display = "inline-block";
                document.getElementById("adminModeBtn").style.display = "inline-block";

                alert("관리자 메뉴가 열렸습니다.");

                titleClickCount = 0;
            }
        });

        document
            .getElementById("adminModeBtn")
            .addEventListener("click", () => {
                const password = prompt("관리자 비밀번호를 입력하세요.");

                if (password !== "fbsrud12@@") {
                    alert("비밀번호가 틀렸습니다.");
                    return;
                }

                isAdminMode = !isAdminMode;
                renderSeats();

                alert(isAdminMode ? "관리자 모드가 켜졌습니다." : "관리자 모드가 꺼졌습니다.");
            });
    </script>

</body>

</html>
